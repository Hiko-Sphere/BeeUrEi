# XcodeGen 工程描述文件。
# 改完这个文件后，在项目根目录运行 `xcodegen generate` 重新生成 BeeUrEi.xcodeproj。
# 新手通常不用碰它——直接 open BeeUrEi.xcodeproj 即可。
name: BeeUrEi
options:
  bundleIdPrefix: com.beeurei
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  # 源码内字面量是中文，故基准语言=简体中文；英文经 String Catalog（BeeUrEi/Localizable.xcstrings）翻译，
  # 使 AppIntents/Siri 快捷指令标题在英文设备上显示英文（唤起短语本身已中英双语）。
  developmentLanguage: zh-Hans
settings:
  base:
    SWIFT_VERSION: "5.0"          # 用 Swift 5 语言模式，先避开 Swift 6 严格并发对新手的干扰
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
# 真实 WebRTC 音视频（A2）——默认**不**接入，保证在任意网络（含国内无法稳定访问 GitHub）下都能编译。
# 代码已就绪：MediaEngine.swift 的 `#if canImport(WebRTC)` 在装包后自动激活真实引擎，未装则用占位引擎。
# 做真机双端视频联调时再启用：在能访问 github.com 的网络（或用镜像/手动下 xcframework）下，
# 取消下面 packages 块与 dependencies 里 WebRTC 一行的注释，然后 `xcodegen generate`：
# packages:
#   WebRTC:
#     url: https://github.com/stasel/WebRTC
#     from: "148.0.0"
schemes:
  BeeUrEi:
    build:
      targets:
        BeeUrEi: all
        BeeUrEiTests: [test]
    test:
      targets:
        - BeeUrEiTests
targets:
  BeeUrEi:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BeeUrEi
      # 直接编译核心逻辑源码（与 Packages/BeeUrEiCore 同一份文件，单一真相来源）。
      # 该包独立用于 `swift test` 在 Mac 本机跑单测；因本机未装 iOS 模拟器运行时，
      # 走 Xcode SPM 产物链接会卡在 scheme 目的地解析，故直接把源码纳入 App 编译。
      - path: Packages/BeeUrEiCore/Sources/BeeUrEiCore
    dependencies:
      # 本地 vendored WebRTC.xcframework（A2 真实音视频）：不走 GitHub，国内可用。
      # 文件在 Frameworks/WebRTC.xcframework（已 gitignore，91MB，需本地存在）。
      # 装包即激活 MediaEngine.swift 的 #if canImport(WebRTC) 真实引擎。
      - framework: Frameworks/WebRTC.xcframework
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beeurei.BeeUrEi
        TARGETED_DEVICE_FAMILY: "1"   # 1 = 仅 iPhone（iPad 是否支持见 PLAN.md §11-12，暂不支持）
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # 推送能力（VoIP 来电 + 提醒推送）。无此入口则真机拿不到任何 APNs token。
        CODE_SIGN_ENTITLEMENTS: BeeUrEi/BeeUrEi.entitlements
    info:
      path: Config/Info.plist
      properties:
        CFBundleDisplayName: BeeUrEi
        # 声明支持的本地化（中英）：系统据此为 AppIntents/快捷指令等挑选对应语言。
        CFBundleLocalizations:
          - zh-Hans
          - en
        NSHumanReadableCopyright: "© 2026 Hiko Sphere 彦穹科技 · 软件制作人 Li Yanpei Hiko"
        # 仅适配 ARKit 设备（最终 LiDAR 限制由运行时 DeviceSupport.hasLiDAR 把关，见 PLAN §12.1）
        UIRequiredDeviceCapabilities:
          - arm64
          - arkit
        # 品牌化启动界面：墨蓝背景 + 居中蜂鸣 Logo（BeeUrEi/LaunchScreen.storyboard）。
        UILaunchStoryboardName: LaunchScreen
        # 后台音频（通话期间锁屏仍可对讲）+ voip（A1 后台来电唤醒）+ location（实时位置共享时熄屏/口袋仍持续上报）。
        UIBackgroundModes:
          - audio
          - voip
          - location
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # 这三段权限文案会原样显示在系统授权弹窗里（见 PLAN.md §7.4）
        NSCameraUsageDescription: "用于通过摄像头实时识别前方障碍并向你语音提示，以及在你呼叫志愿者时传输画面。"
        NSLocationWhenInUseUsageDescription: "用于规划步行路线并播报你途经的路口与地标，以及在你开启时与亲友/协助者实时共享位置。"
        NSMicrophoneUsageDescription: "用于与远程志愿者实时语音交流、发送语音消息和语音指令。"
        NSLocalNetworkUsageDescription: "用于连接你自托管的 BeeUrEi 后端（局域网内）。"
        NSMotionUsageDescription: "用于 AirPods 头部追踪提升空间音方向准确度，以及检测疑似摔倒以便通知亲友。"
        NSSpeechRecognitionUsageDescription: "用于语音指令：说出'我在哪''带我去某地'等即可直达对应功能（优先在设备端识别）。"
        # 开发期允许访问局域网内自托管后端的明文 HTTP（生产应改用 HTTPS）。
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
  # 应用层单测（F1）：跑在模拟器，宿主为 BeeUrEi App（可 @testable 访问 VM/编解码等内部逻辑）。
  BeeUrEiTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/BeeUrEiTests
    dependencies:
      - target: BeeUrEi
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/BeeUrEi.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)BeeUrEi
        BUNDLE_LOADER: $(TEST_HOST)
