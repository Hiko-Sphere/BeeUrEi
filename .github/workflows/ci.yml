# BeeUrEi 持续集成：每次 push 到 main 或 PR 时，自动跑核心单测 + 后端测试 + iOS 构建。
# 守住"可上线"质量门槛——任一失败即阻止合并。
name: CI

# 最小权限：本 CI 仅 checkout + 跑测试/构建，从不写仓库/发布。显式把 GITHUB_TOKEN 收窄为只读，
# 万一某步骤（含 PR 里可被改的 scripts/fetch-webrtc.sh）被投毒，也无法改仓库/发 release（GitHub 加固指南推荐）。
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core-tests:
    name: 核心逻辑单测 (Swift)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: swift test (BeeUrEiCore)
        run: swift test --package-path Packages/BeeUrEiCore

  backend:
    name: 后端 (Node + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: typecheck
        run: npm run typecheck
      - name: test
        run: npm test

  ios-build:
    name: iOS 构建
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Fetch WebRTC.xcframework (A2 真实音视频，CI 可达 GitHub)
        run: bash scripts/fetch-webrtc.sh
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build (iphonesimulator, no signing)
        # 仅 arm64 模拟器：stasel/WebRTC（A2）的模拟器切片只含 arm64，
        # 不指定会连 x86_64 致链接失败。macos-14 runner 为 Apple Silicon，真机/Xcode 同样走 arm64。
        run: |
          xcodebuild -project BeeUrEi.xcodeproj -target BeeUrEi \
            -sdk iphonesimulator -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            ARCHS=arm64 ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO build
      - name: App-layer unit tests (F1, 模拟器)
        run: |
          DEST=$(xcrun simctl list devices available | grep -m1 -oE 'iPhone [^(]+' | sed 's/ *$//')
          xcodebuild -project BeeUrEi.xcodeproj -scheme BeeUrEi \
            -destination "platform=iOS Simulator,name=${DEST:-iPhone 15}" \
            -only-testing BeeUrEiTests \
            ARCHS=arm64 ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO test
