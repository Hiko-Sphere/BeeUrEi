# BeeUrEi 自托管 coturn（TURN/STUN）——与后端短时效凭据(use-auth-secret)配套。
# 后端 /api/assist/turn 用同一 static-auth-secret 签发 username=过期时间戳、credential=HMAC-SHA1。
# 客户端拿这对凭据连 TURN，过期失效，无需在 coturn 建静态账号。

listening-port=3478
fingerprint
use-auth-secret
# 与后端 .env 的 TURN_SECRET 必须一致（部署时用 docker-compose 注入或在此填）。
# static-auth-secret=__SET_VIA_COMPOSE__
realm=beeurei

# WebRTC 只需 UDP 中继；限定中继端口范围（需在防火墙/安全组放行）。
min-port=49160
max-port=49200

# 你的服务器公网 IP（必填；docker-compose 用 TURN_EXTERNAL_IP 注入）。
# external-ip=YOUR_PUBLIC_IP

# 安全加固：禁用回环/多播中继，防 SSRF/滥用。
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
no-cli
