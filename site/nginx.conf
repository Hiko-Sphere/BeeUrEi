# BeeUrEi 官网（beeurei.hikosphere.com）——独立静态站点，nginx:alpine。
# 监听容器内 80；宿主以 -p 127.0.0.1:8088:80 绑定，Cloudflare 隧道 Public Hostname 指向 http://localhost:8088。
# 与 API/admin（beeurei-api.hikosphere.com）严格同机异源隔离。
server {
    listen 80;
    listen [::]:80;
    server_name beeurei.hikosphere.com localhost;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # 不泄露 nginx 版本
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml application/manifest+json;

    # HTML：随时重新校验（部署后立刻可见新内容）。
    location = / {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
        try_files /index.html =404;
    }
    location = /index.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # 指纹化静态资源：长期不可变缓存。
    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # 其余根级路径：已知文件（robots/sitemap/favicon/og 图等）直出；未知页面回落首页（不影响 /assets/ 的真实 404）。
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri $uri/ /index.html;
    }

    # 健康检查（隧道/编排用），不缓存。
    location = /healthz {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Content-Type "text/plain" always;
        return 200 "ok\n";
    }
}
