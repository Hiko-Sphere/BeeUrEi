# BeeUrEi 持续集成：每次 push 到 main 或 PR 时，自动跑核心单测 + 后端测试 + iOS 构建。
# 守住"可上线"质量门槛——任一失败即阻止合并。
name: CI

# 最小权限：本 CI 仅 checkout + 跑测试/构建，从不写仓库/发布。显式把 GITHUB_TOKEN 收窄为只读，
# 万一某步骤（含 PR 里可被改的 scripts/fetch-webrtc.sh）被投毒，也无法改仓库/发 release（GitHub 加固指南推荐）。
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core-tests:
    name: 核心逻辑单测 (Swift)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: swift test (BeeUrEiCore)
        run: swift test --package-path Packages/BeeUrEiCore

  backend:
    name: 后端 (Node + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      # 供应链门禁：生产依赖出现 high/critical 通告即红——服务端跑着位置/紧急/实名等敏感数据，
      # 新通告要立刻被看见。--omit=dev 排除构建链噪音（不随服务运行），门槛 high 保持"红=真要处理"。
      - name: audit (prod deps, high+)
        run: npm audit --omit=dev --audit-level=high
      - name: typecheck
        run: npm run typecheck
      - name: lint
        run: npm run lint
      - name: test
        run: npm test

  web:
    name: 网页协助端 (React + eslint + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site/app-src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/app-src/package-lock.json
      - run: npm ci
      # 供应链门禁（同后端理由）：web 的生产依赖会打进浏览器包（React 等），high/critical 即红；
      # dev 依赖（vite/eslint 链）不进包，排除以免无关通告卡住合并。
      - name: audit (prod deps, high+)
        run: npm audit --omit=dev --audit-level=high
      - name: lint
        run: npm run lint
      - name: test
        run: npm test
      - name: build
        run: npm run build

  site:
    name: 官网静态质量门禁
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # 零依赖脚本（无 npm install）：lang/h1/img-alt/锚点命中/站内链接可达/sitemap↔页面互查/robots 声明。
      # 曾人工审计过一次（全绿），固化成门禁防回归——断链/丢 alt 对官网（盲人辅助产品的门面）格外难堪。
      - name: check-site
        run: node scripts/check-site.mjs

  ios-build:
    name: iOS 构建
    # macos-14 的默认 Xcode 远旧于本仓实际工具链（本机 Xcode 26.6 构建通过、同配方 CI 恒失败）；
    # 用最新镜像并显式选镜像内最新 Xcode。core 的 swift test 在 macos-14 一直绿，不动。
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode on runner
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Fetch WebRTC.xcframework (A2 真实音视频，CI 可达 GitHub)
        run: bash scripts/fetch-webrtc.sh
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build (iphonesimulator, no signing)
        # 仅 arm64 模拟器：stasel/WebRTC（A2）的模拟器切片只含 arm64，
        # 不指定会连 x86_64 致链接失败。macos-14 runner 为 Apple Silicon，真机/Xcode 同样走 arm64。
        run: |
          xcodebuild -project BeeUrEi.xcodeproj -target BeeUrEi \
            -sdk iphonesimulator -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            ARCHS=arm64 ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO build
      - name: App-layer unit tests (F1, 模拟器)
        run: |
          DEST=$(xcrun simctl list devices available | grep -m1 -oE 'iPhone [^(]+' | sed 's/ *$//')
          xcodebuild -project BeeUrEi.xcodeproj -scheme BeeUrEi \
            -destination "platform=iOS Simulator,name=${DEST:-iPhone 15}" \
            -only-testing BeeUrEiTests \
            ARCHS=arm64 ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO test
