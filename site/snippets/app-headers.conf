# 协助者/亲友网页端（/app）的响应头。比官网根域更宽松，因为它是一个需要：
#   · 跨源调用 API（fetch + WebSocket 信令）：connect-src 放行 beeurei-api 的 https/wss
#   · 麦克风（WebRTC 通话发本端语音）：Permissions-Policy 放行 microphone=(self)
#   · 地理定位（位置共享给亲友 + 聊天发送位置）：Permissions-Policy 放行 geolocation=(self)
#     ——此前误设 geolocation=()（空白名单=对所有源含本源一律禁用），浏览器直接拒绝 getCurrentPosition/
#     watchPosition，位置共享/发位置功能完全无法取得权限；改 (self) 仅放行本站自身、不放行第三方/iframe。
#   · 播放录制/聊天媒体：media-src 放行 API 源 + blob:/data:
#   · React 运行时内联样式：style-src 'unsafe-inline'
# 的单页应用。脚本仍仅同源（Vite 产物为外链、无内联脚本），杜绝 XSS 注入面。相机不放行（helper getUserMedia
# 仅 audio:true/video:false，不用摄像头）；本站 X-Frame-Options DENY + frame-ancestors 'none' 不可被嵌入，
# geolocation=(self) 无第三方搭车面。
# 注意 nginx add_header 继承规则：含 add_header 的 location 须 include 本片段，避免漏头。
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Frame-Options "DENY" always;
add_header Permissions-Policy "microphone=(self), camera=(), geolocation=(self), interest-cohort=(), browsing-topics=(), payment=(), usb=()" always;
add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: blob: https://*.tile.openstreetmap.org; media-src 'self' data: blob: https://beeurei-api.hikosphere.com; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self' https://beeurei-api.hikosphere.com wss://beeurei-api.hikosphere.com; form-action 'self'; manifest-src 'self'; upgrade-insecure-requests" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
