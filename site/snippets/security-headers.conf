# 安全响应头（官网与 API/admin 同机但独立源；这里锁到最严：静态站点不需要任何外部资源）。
# 注意 nginx add_header 继承规则：某 location 内只要再次出现 add_header 就会丢弃外层全部 add_header，
# 故各 location 统一 include 本片段，避免漏头。
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Frame-Options "DENY" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), browsing-topics=(), payment=(), usb=()" always;
# 全部资源同源、无内联脚本/样式（CSS/JS 已外链）、禁止被嵌入、强制升级 HTTP。
add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data:; style-src 'self'; script-src 'self'; font-src 'self'; connect-src 'self'; form-action 'self'; manifest-src 'self'; upgrade-insecure-requests" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
